---
version: '3.8'
services:
  web:
    image: nginx:latest
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
    ports:      
       - "9999:80"
    networks:
       - frontend
  api:
    image: my-app-web-image
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
    networks:
      - frontend
      - backend
  db:
    image: mysql
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manger
    networks:
      - backend
networks:
  frontend:
  backend:
